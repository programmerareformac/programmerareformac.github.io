<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clifford's Website</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            background-color: black;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #main-content {
            position: relative;
            width: 100%;
            height: 100%;
            margin-left: 150px; /* Space for button panel */
        }
        #button-panel {
            position: fixed;
            left: 0;
            top: 0;
            width: 150px;
            height: 100%;
            background-color: rgba(50, 50, 50, 0.8);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }
        .panel-button {
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .panel-button:hover {
            background-color: #45a049;
        }
        #stars {
            position: fixed;
            top: 0;
            left: 150px; /* Align with main content */
            right: 0;
            height: 100%;
            z-index: 1;
        }
        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            animation: blink 1s infinite alternate;
        }
        @keyframes blink {
            0% { opacity: 0.2; }
            100% { opacity: 1; }
        }
        #moon {
            position: fixed;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #f0f0f0;
            box-shadow: inset -25px 0 #d0d0d0;
            z-index: 2;
        }
        #spaceship {
            position: fixed;
            width: 40px;
            height: 40px;
            background-color: #808080;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            z-index: 3;
        }
        #scroller-container {
            position: fixed;
            top: 50%;
            left: 150px; /* Align with main content */
            right: 0;
            transform: translateY(-50%);
            z-index: 4;
            overflow: hidden;
        }
        #scroller {
            font-size: 24px;
            font-weight: bold;
            white-space: nowrap;
            position: relative;
            color: white;
        }
    </style>
</head>
<body>
    <div id="button-panel">
        <button class="panel-button">Button 1</button>
        <button class="panel-button">Button 2</button>
        <button class="panel-button">Button 3</button>
        <button class="panel-button">Button 4</button>
        <button class="panel-button">Button 5</button>
    </div>
    <div id="main-content">
        <div id="stars"></div>
        <div id="moon"></div>
        <div id="spaceship"></div>
        <div id="scroller-container">
            <div id="scroller">Clifords webbsida 2024-10-24  ----</div>
        </div>
    </div>

    <script>
        const scroller = document.getElementById('scroller');
        const container = document.getElementById('scroller-container');
        const starsContainer = document.getElementById('stars');
        const moon = document.getElementById('moon');
        const spaceship = document.getElementById('spaceship');
        let horizontalPosition = container.offsetWidth;
        let verticalPosition = 0;
        let verticalDirection = 1;
        const horizontalSpeed = 2;
        const verticalSpeed = 1;
        const bounceLimit = 20;
        const colorChangeInterval = 500;

        function getRandomColor() {
            return `rgb(${Math.random()*255},${Math.random()*255},${Math.random()*255})`;
        }

        function changeColor() {
            scroller.style.color = getRandomColor();
        }

        function animate() {
            horizontalPosition -= horizontalSpeed;
            verticalPosition += verticalSpeed * verticalDirection;
            
            if (verticalPosition >= bounceLimit || verticalPosition <= -bounceLimit) {
                verticalDirection *= -1;
            }
            
            if (horizontalPosition < -scroller.offsetWidth) {
                horizontalPosition = container.offsetWidth;
            }
            
            scroller.style.transform = `translate(${horizontalPosition}px, ${verticalPosition}px)`;
            requestAnimationFrame(animate);
        }

        function createStars(count) {
            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.width = `${Math.random() * 3 + 1}px`;
                star.style.height = star.style.width;
                star.style.animationDelay = `${Math.random() * 2}s`;
                starsContainer.appendChild(star);
            }
        }

        function moveStars() {
            const stars = document.querySelectorAll('.star');
            stars.forEach(star => {
                let x = parseFloat(star.style.left);
                let y = parseFloat(star.style.top);
                
                x += (Math.random() - 0.5) * 0.1;
                y += (Math.random() - 0.5) * 0.1;
                
                if (x < 0) x = 100;
                if (x > 100) x = 0;
                if (y < 0) y = 100;
                if (y > 100) y = 0;
                
                star.style.left = `${x}%`;
                star.style.top = `${y}%`;
            });
            requestAnimationFrame(moveStars);
        }

        function moveMoon() {
            let angle = 0;
            const radius = 200;
            const centerX = (window.innerWidth - 150) / 2 + 150; // Adjust for panel
            const centerY = window.innerHeight / 2;

            function updateMoonPosition() {
                const x = centerX + radius * Math.cos(angle);
                const y = centerY + radius * Math.sin(angle);
                moon.style.left = `${x - 50}px`;
                moon.style.top = `${y - 50}px`;
                angle += 0.001;
                requestAnimationFrame(updateMoonPosition);
            }

            updateMoonPosition();
        }

        function moveSpaceship() {
            let x = window.innerWidth;
            let y = window.innerHeight;
            let landed = false;
            let landingAngle = 0;

            function updateSpaceshipPosition() {
                const moonRect = moon.getBoundingClientRect();
                const moonCenterX = moonRect.left + moonRect.width / 2;
                const moonCenterY = moonRect.top + moonRect.height / 2;

                if (!landed) {
                    x -= 1;
                    y = (moonCenterY - y) * 0.02 + y;

                    const distance = Math.sqrt(Math.pow(x - moonCenterX, 2) + Math.pow(y - moonCenterY, 2));
                    if (distance < 30) {
                        landed = true;
                        landingAngle = Math.atan2(y - moonCenterY, x - moonCenterX);
                    }
                } else {
                    const landingRadius = 60;
                    x = moonCenterX + Math.cos(landingAngle) * landingRadius;
                    y = moonCenterY + Math.sin(landingAngle) * landingRadius;
                }

                spaceship.style.left = `${x - 20}px`;
                spaceship.style.top = `${y - 20}px`;
                
                if (landed) {
                    spaceship.style.transform = `rotate(${landingAngle + Math.PI/2}rad)`;
                }

                requestAnimationFrame(updateSpaceshipPosition);
            }

            updateSpaceshipPosition();
        }

        // Add button click handlers
        document.querySelectorAll('.panel-button').forEach(button => {
            button.addEventListener('click', function() {
                alert(`You clicked ${this.textContent}`);
            });
        });

        createStars(100);
        animate();
        moveStars();
        moveMoon();
        moveSpaceship();
        setInterval(changeColor, colorChangeInterval);
    </script>
</body>
</html>
